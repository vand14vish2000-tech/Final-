apiVersion: apps/v1
kind: Deployment
metadata:
  name: product-backend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: product-backend
  template:
    metadata:
      labels:
        app: product-backend
    spec:
      containers:
      - name: backend
        image: DOCKER_NAMESPACE_PLACEHOLDER/product-backend:IMAGE_TAG_PLACEHOLDER
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 5000
---
apiVersion: v1
kind: Service
metadata:
  name: product-backend-service
spec:
  selector:
    app: product-backend
  ports:
    - port: 5000
      targetPort: 5000
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: product-frontend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: product-frontend
  template:
    metadata:
      labels:
        app: product-frontend
    spec:
      containers:
      - name: frontend
        image: DOCKER_NAMESPACE_PLACEHOLDER/product-frontend:IMAGE_TAG_PLACEHOLDER
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 3000
---
apiVersion: v1
kind: Service
metadata:
  name: product-frontend-service
spec:
  type: NodePort
  selector:
    app: product-frontend
  ports:
    - port: 80
      targetPort: 3000